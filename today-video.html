<style>
body { font-family: var(--sans); background: var(--bg); color: var(--tx); min-height: 100vh; }

.wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px; }

/* Search */
.search-hero {
  text-align: center;
  padding: 40px 0 28px;
}
.sh-title {
  font-family: var(--display);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 900;
  letter-spacing: -1px;
  text-transform: uppercase;
  color: var(--tx);
  margin-bottom: 6px;
  line-height: 1;
}
.sh-title span { color: var(--acc); }
.sh-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--tx3);
  letter-spacing: .8px;
  margin-bottom: 24px;
}

.search-box {
  position: relative;
  margin-bottom: 8px;
}
.search-inp {
  width: 100%;
  background: var(--s2);
  border: 2px solid var(--b2);
  border-radius: 40px;
  padding: 16px 20px 16px 52px;
  color: var(--tx);
  font-family: var(--sans);
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
}
.search-inp:focus { border-color: var(--acc); }
.search-inp::placeholder { color: var(--tx3); }
.search-icon {
  position: absolute;
  left: 18px; top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  pointer-events: none;
}
.search-hint {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--tx3);
  text-align: center;
  letter-spacing: .5px;
}

/* Currently set banner */
.current-banner {
  background: linear-gradient(135deg, var(--grn-d), var(--acc-d));
  border: 1.5px solid var(--grn);
  border-radius: var(--rl);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: none;
}
.current-banner.show { display: block; }
.cb-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--grn);
  margin-bottom: 6px;
}
.cb-video {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .3px;
  text-transform: uppercase;
  color: var(--tx);
  margin-bottom: 3px;
}
.cb-chapter {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--tx2);
}
.cb-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

/* Chapter groups */
.chapter-group {
  margin-bottom: 6px;
  border-radius: var(--rl);
  overflow: hidden;
  border: 1px solid var(--b1);
  background: var(--s1);
}
.ch-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  transition: background .15s;
  user-select: none;
}
.ch-header:hover { background: var(--s2); }
.ch-header.open { background: var(--s2); border-bottom: 1px solid var(--b1); }
.ch-num {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 800;
  color: var(--acc);
  min-width: 48px;
}
.ch-title {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--tx);
}
.ch-count {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--tx3);
  letter-spacing: .3px;
}
.ch-arrow {
  font-size: 12px;
  color: var(--tx3);
  transition: transform .2s;
}
.ch-header.open .ch-arrow { transform: rotate(90deg); }

.ch-videos {
  display: none;
  padding: 6px 8px;
}
.ch-header.open + .ch-videos { display: block; }

.video-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 2px;
}
.video-item:hover { background: var(--acc-d); }
.video-item.current { background: var(--grn-d); border: 1px solid var(--grn); }
.video-num {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--tx3);
  min-width: 28px;
  flex-shrink: 0;
}
.video-item.current .video-num { color: var(--grn); }
.video-name {
  flex: 1;
  font-size: 12px;
  color: var(--tx2);
  font-weight: 500;
}
.video-item:hover .video-name { color: var(--tx); }
.video-item.current .video-name { color: var(--grn); font-weight: 600; }
.video-select-btn {
  font-family: var(--mono);
  font-size: 9px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--b2);
  background: transparent;
  color: var(--tx3);
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.video-item:hover .video-select-btn {
  border-color: var(--acc);
  color: var(--acc);
  background: var(--acc-d);
}
.video-item.current .video-select-btn {
  border-color: var(--grn);
  color: var(--grn);
  background: var(--grn-d);
}

/* No results */
.no-results {
  text-align: center;
  padding: 40px 20px;
  color: var(--tx3);
  font-family: var(--mono);
  font-size: 11px;
  display: none;
}

/* Toast */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--s2); border: 1px solid var(--b2);
  border-radius: var(--r); padding: 10px 16px;
  font-family: var(--mono); font-size: 11px; color: var(--tx);
  z-index: 1000; opacity: 0; transform: translateY(8px);
  transition: all .25s; max-width: 300px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { border-color: var(--grn); color: var(--grn); }

.btn { padding: 8px 18px; border-radius: var(--r); border: none; cursor: pointer; font-family: var(--display); font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { transform: translateY(-1px); }
.btn-acc  { background: var(--acc); color: var(--bg); }
.btn-grn  { background: var(--grn); color: var(--bg); }
.btn-ghost { background: transparent; border: 1px solid var(--b2); color: var(--tx2); }
.btn-ghost:hover { border-color: var(--b3); color: var(--tx); }
.btn-sm { padding: 5px 12px; font-size: 10px; border-radius: 5px; }

/* Back btn */
#floatingBackBtn {
  position: fixed; bottom: 20px; right: 20px;
  background: rgba(5,8,16,0.92); border: 1.5px solid var(--acc);
  color: var(--acc); font-family: var(--mono); font-size: 11px;

  box-shadow: 0 4px 20px rgba(0,200,255,0.15);
}
#floatingBackBtn:hover { background: rgba(0,200,255,0.15); transform: translateY(-2px); }
</style>

  // Redirect non-teachers
  if (localStorage.getItem('teacher_unlocked') !== 'true') {
    window.location.href = 'hub.html';
    return;
  }
  renderCurrentBanner();
  renderVideoList('');
  document.getElementById('searchInp').focus();
}

// ── CURRENT BANNER ────────────────────────────────────
function renderCurrentBanner() {
  const v = ls('today_video', null);
  const banner = document.getElementById('currentBanner');
  if (v) {
    document.getElementById('cbVideo').textContent = v.video;
    document.getElementById('cbChapter').textContent = v.ch + ' · ' + v.title;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// ── SELECT A VIDEO ─────────────────────────────────────
function selectVideo(num) {
  const v = ALL_VIDEOS.find(x => x.num === num);
  if (!v) return;

  // Save to localStorage — all tools read from these keys
  sl('today_video', v);
  sl('today_video_name', v.video);
  sl('today_chapter', v.ch);
  sl('today_chapter_title', v.title);
  sl('today_video_num', v.num);

  // Also update the video-index based day number
  // Find which "day" this video falls on based on sequential order
  const idx = ALL_VIDEOS.findIndex(x => x.num === v.num);
  // Map video index to approximate day (147 videos / 68 days ≈ 2.16 per day)
  const approxDay = Math.min(68, Math.ceil((idx + 1) / ALL_VIDEOS.length * 68));
  sl('current_day', approxDay);

  // Sync to legacy keys used by other tools
  sl('scc_today_video', v.video);
  sl('scc_today_chapter', v.ch);
  localStorage.setItem('current_video_num', String(v.num));

  currentVideo = v;
  renderCurrentBanner();
  renderVideoList(currentFilter);
  toast('✓ Set! All tools updated — ' + v.video, 'ok');
}

// ── RENDER VIDEO LIST ──────────────────────────────────
function renderVideoList(query) {
  currentFilter = query;
  const q = query.trim().toLowerCase();

  // Filter videos
  const filtered = q
    ? ALL_VIDEOS.filter(v =>
        v.video.toLowerCase().includes(q) ||
        v.ch.toLowerCase().includes(q) ||
        v.title.toLowerCase().includes(q) ||
        String(v.num).includes(q)
      )
    : ALL_VIDEOS;

  if (!filtered.length) {
    document.getElementById('videoList').innerHTML = '';
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';

  // Group by chapter
  const groups = {};
  filtered.forEach(v => {
    if (!groups[v.ch]) groups[v.ch] = { title: v.title, ch: v.ch, videos: [] };
    groups[v.ch].videos.push(v);
  });

  const isCurrent = v => currentVideo && currentVideo.num === v.num;

  // When searching, auto-expand all groups; otherwise collapsed by default
  const autoExpand = q.length > 0;

  document.getElementById('videoList').innerHTML = Object.values(groups).map(g => `
    <div class="chapter-group">
      <div class="ch-header ${autoExpand ? 'open' : ''}" onclick="toggleChapter(this)">
        <div class="ch-num">${g.ch}</div>
        <div class="ch-title">${g.title}</div>
        <div class="ch-count">${g.videos.length} video${g.videos.length !== 1 ? 's' : ''}</div>
        <div class="ch-arrow">›</div>
      </div>
      <div class="ch-videos">
        ${g.videos.map(v => `
          <div class="video-item ${isCurrent(v) ? 'current' : ''}" onclick="selectVideo(${v.num})">
            <div class="video-num">#${v.num}</div>
            <div class="video-name">${v.video}</div>
            <button class="video-select-btn" onclick="event.stopPropagation();selectVideo(${v.num})">
              ${isCurrent(v) ? '✓ Current' : 'Select'}
            </button>
          </div>`).join('')}
      </div>
    </div>`).join('');

  // Auto-expand if currently selected chapter is in view
  if (!autoExpand && currentVideo) {
    const headers = document.querySelectorAll('.ch-header');
    headers.forEach(h => {
      const num = h.querySelector('.ch-num')?.textContent;
      if (num === currentVideo.ch) h.classList.add('open');
    });
  }
}

function filterVideos(q) {
  renderVideoList(q);
}

function toggleChapter(el) {
  el.classList.toggle('open');
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 3500);
}

init();
</script>
</body>
</html>
